<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model & Layout Control</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Upcoming Events</h1>

    <div class="eventCard">
        <h2>Music Festival</h2>
        <p>Enjoy live music performances.</p>
    </div>

    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" class="selectedField">
    </form>

    <div class="hiddenBox">
        This box uses visibility: hidden.
    </div>

    <div class="noneBox">
        This box uses display: none.
    </div>

    <p>
        The hidden box occupies space, while the display:none box does not.
    </p>

</body>
</html>
