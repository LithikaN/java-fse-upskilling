<!DOCTYPE html>
<html>
<head>
    <title>Exercise 18.2</title>

    <link rel="stylesheet"
          href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

    <div class="accordion" id="myAccordion">

        <!-- Item 1 -->
        <div class="accordion-item">

            <h2 class="accordion-header">
                <button class="accordion-button" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#item1">
                    Section 1
                </button>
            </h2>

            <div id="item1" class="accordion-collapse collapse show"
                 data-bs-parent="#myAccordion">

                <div class="accordion-body">
                    Content for section 1
                </div>

            </div>

        </div>

        <!-- Item 2 -->
        <div class="accordion-item">

            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#item2">
                    Section 2
                </button>
            </h2>

            <div id="item2" class="accordion-collapse collapse"
                 data-bs-parent="#myAccordion">

                <div class="accordion-body">
                    Content for section 2
                </div>

            </div>

        </div>

    </div>

</div>

<script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
