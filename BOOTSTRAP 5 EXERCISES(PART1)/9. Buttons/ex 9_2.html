<!DOCTYPE html>
<html>
<head>
    <title>Exercise 9.2</title>

    <link rel="stylesheet"
          href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

    <h3>Button Group</h3>

    <div class="btn-group" role="group">

        <button type="button" class="btn btn-primary">
            Left
        </button>

        <button type="button" class="btn btn-primary">
            Middle
        </button>

        <button type="button" class="btn btn-primary">
            Right
        </button>

    </div>

    <hr>

    <h3>Toggle Buttons with Checkboxes</h3>

    <input type="checkbox"
           class="btn-check"
           id="check1"
           autocomplete="off">

    <label class="btn btn-outline-success me-2"
           for="check1">
        Option 1
    </label>

    <input type="checkbox"
           class="btn-check"
           id="check2"
           autocomplete="off">

    <label class="btn btn-outline-primary"
           for="check2">
        Option 2
    </label>

</div>

<script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
