<!DOCTYPE html>
<html>
<head>
    <title>Exercise 13.1</title>

    <link rel="stylesheet"
          href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Dashboard
    </h2>

    <div class="row g-3">

        <div class="col-md-3">

            <div class="bg-primary text-white p-4 rounded text-center">

                <h4>Sales</h4>
                <p>₹50,000</p>

            </div>

        </div>

        <div class="col-md-3">

            <div class="bg-warning text-dark p-4 rounded text-center">

                <h4>Orders</h4>
                <p>120</p>

            </div>

        </div>

        <div class="col-md-3">

            <div class="bg-success text-white p-4 rounded text-center">

                <h4>Revenue</h4>
                <p>₹1,20,000</p>

            </div>

        </div>

        <div class="col-md-3">

            <div class="bg-danger text-white p-4 rounded text-center">

                <h4>Users</h4>
                <p>350</p>

            </div>

        </div>

    </div>

</div>

<script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
