<!DOCTYPE html>
<html>
<head>
    <title>Exercise 12.2</title>

    <link rel="stylesheet"
          href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>

<body>

<div class="container py-5">

    <h2 class="text-center mb-5">
        Pricing Plans
    </h2>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card text-center p-4">

                <h3>Basic</h3>

                <h4 class="my-3">₹499</h4>

                <p>1 User</p>
                <p>5 GB Storage</p>

                <button class="btn btn-primary mt-3">
                    Choose Plan
                </button>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-center p-4">

                <h3>Standard</h3>

                <h4 class="my-3">₹999</h4>

                <p>5 Users</p>
                <p>50 GB Storage</p>

                <button class="btn btn-success mt-3">
                    Choose Plan
                </button>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-center p-4">

                <h3>Premium</h3>

                <h4 class="my-3">₹1499</h4>

                <p>Unlimited Users</p>
                <p>200 GB Storage</p>

                <button class="btn btn-danger mt-3">
                    Choose Plan
                </button>

            </div>

        </div>

    </div>

</div>

<script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
