<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 30px;
        }

        h1 {
            color: darkblue;
            text-align: center;
        }

        .container {
            width: 500px;
            margin: auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        label {
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background-color: blue;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }

        output {
            color: green;
            font-weight: bold;
        }
    </style>

    <script>

        function registerEvent() {

            document.getElementById("message").value =
                "Registration Successful! Thank you for registering.";

        }

    </script>

</head>

<body>

    <!-- Scenario -->

    <h1>Local Community Event Portal</h1>

    <div class="container">

        <h2>Event Registration Form</h2>

        <p>
            Residents can register for upcoming community events
            by filling out the form below.
        </p>

        <form>

            <label>Full Name:</label>
            <input type="text"
                   placeholder="Enter your full name"
                   required
                   autofocus>

            <label>Email Address:</label>
            <input type="email"
                   placeholder="Enter your email"
                   required>

            <label>Event Date:</label>
            <input type="date"
                   required>

            <label>Event Type:</label>

            <select required>

                <option value="">
                    Select an Event
                </option>

                <option>
                    Music Festival
                </option>

                <option>
                    Sports Meet
                </option>

                <option>
                    Art Exhibition
                </option>

                <option>
                    Book Fair
                </option>

                <option>
                    Technology Expo
                </option>

            </select>

            <label>Message:</label>

            <textarea rows="4"
                      placeholder="Enter your message"
                      required>
            </textarea>

            <button type="button"
                    onclick="registerEvent()">

                Register

            </button>

            <br><br>

            <output id="message"></output>

        </form>

    </div>

</body>

</html>
