<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 30px;
        }

        h1 {
            color: darkblue;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        td {
            padding: 15px;
        }

        .eventImage {
            width: 200px;
            height: 150px;
            border: 3px solid black;
            border-radius: 8px;
        }

        .caption {
            font-weight: bold;
            color: darkgreen;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <!-- Scenario -->

    <h1>Local Community Event Portal</h1>

    <h2>Community Event Gallery</h2>

    <p>
        Residents can view photographs from previous community
        events such as cultural festivals, sports activities,
        exhibitions, and educational programs.
    </p>

    <hr><br>

    <!-- 2 Rows × 3 Columns Table -->

    <table border="1">

        <tr>

            <td>
                <img src="music.jpeg"
                     alt="Music Festival"
                     title="Music Festival"
                     class="eventImage">

                <p class="caption">
                    Music Festival
                </p>
            </td>

            <td>
                <img src="sports.jpg"
                     alt="Sports Meet"
                     title="Sports Meet"
                     class="eventImage">

                <p class="caption">
                    Sports Meet
                </p>
            </td>

            <td>
                <img src="food.jpg"
                     alt="Food Carnival"
                     title="Food Carnival"
                     class="eventImage">

                <p class="caption">
                    Food Carnival
                </p>
            </td>

        </tr>

        <tr>

            <td>
                <img src="art.jpeg"
                     alt="Art Exhibition"
                     title="Art Exhibition"
                     class="eventImage">

                <p class="caption">
                    Art Exhibition
                </p>
            </td>

            <td>
                <img src="book.jpeg"
                     alt="Book Fair"
                     title="Book Fair"
                     class="eventImage">

                <p class="caption">
                    Book Fair
                </p>
            </td>

            <td>
                <img src="tech.jpeg"
                     alt="Technology Expo"
                     title="Technology Expo"
                     class="eventImage">

                <p class="caption">
                    Technology Expo
                </p>
            </td>

        </tr>

    </table>

</body>

</html>
