<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community Event Portal - Nearby Events</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 40px;
        }

        h1{
            color: darkblue;
        }

        button{
            padding: 10px 20px;
            font-size: 16px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        #location{
            margin-top: 20px;
            color: green;
            font-weight: bold;
        }
    </style>

    <script>

        function findLocation() {

            if(navigator.geolocation) {

                const options = {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                };

                navigator.geolocation.getCurrentPosition(
                    showPosition,
                    showError,
                    options
                );

            } else {

                document.getElementById("location").innerHTML =
                "Geolocation is not supported by this browser.";

            }
        }

        function showPosition(position) {

            document.getElementById("location").innerHTML =
            "<h3>Your Current Location</h3>" +
            "Latitude: " + position.coords.latitude +
            "<br><br>" +
            "Longitude: " + position.coords.longitude;

        }

        function showError(error) {

            switch(error.code) {

                case error.PERMISSION_DENIED:
                    document.getElementById("location").innerHTML =
                    "Location access denied by user.";
                    break;

                case error.POSITION_UNAVAILABLE:
                    document.getElementById("location").innerHTML =
                    "Location information unavailable.";
                    break;

                case error.TIMEOUT:
                    document.getElementById("location").innerHTML =
                    "Location request timed out.";
                    break;

                default:
                    document.getElementById("location").innerHTML =
                    "Unknown error occurred.";
            }
        }

    </script>

</head>

<body>

    <h1>Local Community Event Portal</h1>

    <h2>Nearby Event Locator</h2>

    <p>
        Click the button below to locate nearby community events.
        The system uses your current GPS location to identify
        events happening near you.
    </p>

    <button onclick="findLocation()">
        Find Nearby Events
    </button>

    <div id="location"></div>

</body>
</html>
