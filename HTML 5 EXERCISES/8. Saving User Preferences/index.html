<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saving User Preferences</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 30px;
        }

        .container {
            width: 600px;
            margin: auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: darkblue;
        }

        select {
            padding: 10px;
            width: 250px;
            margin: 10px;
        }

        button {
            padding: 10px 15px;
            margin: 10px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        #status {
            color: green;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>

    <script>

        /* Load saved preference when page opens */

        function loadPreference() {

            let savedEvent =
                localStorage.getItem("preferredEvent");

            if (savedEvent) {

                document.getElementById("eventType").value =
                    savedEvent;

                document.getElementById("status").innerHTML =
                    "Previously selected event loaded successfully.";

            }
        }

        /* Save preference */

        function savePreference() {

            let selectedEvent =
                document.getElementById("eventType").value;

            localStorage.setItem(
                "preferredEvent",
                selectedEvent
            );

            sessionStorage.setItem(
                "currentSessionEvent",
                selectedEvent
            );

            document.getElementById("status").innerHTML =
                "Preference saved successfully!";
        }

        /* Clear localStorage and sessionStorage */

        function clearPreferences() {

            localStorage.clear();

            sessionStorage.clear();

            document.getElementById("eventType").selectedIndex = 0;

            document.getElementById("status").innerHTML =
                "All preferences cleared.";
        }

    </script>

</head>

<body onload="loadPreference()">

    <!-- Scenario -->

    <h1>Local Community Event Portal</h1>

    <div class="container">

        <h2>User Event Preferences</h2>

        <p>
            Residents can save their preferred event type.
            When they return to the portal, their previously
            selected preference will be automatically loaded.
        </p>

        <hr>

        <label>
            Select Preferred Event:
        </label>

        <br><br>

        <select id="eventType">

            <option value="">
                -- Select Event --
            </option>

            <option value="Music Festival">
                Music Festival
            </option>

            <option value="Sports Meet">
                Sports Meet
            </option>

            <option value="Art Exhibition">
                Art Exhibition
            </option>

            <option value="Book Fair">
                Book Fair
            </option>

            <option value="Technology Expo">
                Technology Expo
            </option>

        </select>

        <br>

        <button onclick="savePreference()">
            Save Preference
        </button>

        <button onclick="clearPreferences()">
            Clear Preferences
        </button>

        <p id="status"></p>

    </div>

</body>

</html>
